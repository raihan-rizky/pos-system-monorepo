name: Production

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  production-gate:
    name: Production gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true
      HUSKY: 0
      COREPACK_HOME: ${{ github.workspace }}/.corepack
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/pos_ci?schema=public' }}
      DIRECT_URL: ${{ secrets.DIRECT_URL || 'postgresql://postgres:postgres@localhost:5432/pos_ci?schema=public' }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'http://127.0.0.1:54321' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'ci-anon-key' }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY || '' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || '' }}
      WAHA_BASE_URL: ${{ secrets.WAHA_BASE_URL || '' }}
      WAHA_SESSION: ${{ secrets.WAHA_SESSION || 'default' }}
      WAHA_API_KEY: ${{ secrets.WAHA_API_KEY || '' }}
      WAHA_WEBHOOK_SECRET: ${{ secrets.WAHA_WEBHOOK_SECRET || '' }}
      WEBHOOK_BASE_URL: ${{ secrets.WEBHOOK_BASE_URL || '' }}
      CLOSING_DEAL_PUSH_SECRET: ${{ secrets.CLOSING_DEAL_PUSH_SECRET || '' }}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY || '' }}
      VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY || '' }}
      VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT || 'mailto:admin@example.com' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Unit tests
        run: pnpm test

      - name: Build production bundle
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm --filter @pos/web exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: apps/web/test-results
          if-no-files-found: ignore
          retention-days: 7
